openapi: "3.0.0"
info:
  title: GetEntityObservations
  version: "1.0"
paths:
  /getEntityObservations:
    get:
      operationId: getEntityObservations
      description: Retrieves observations recorded against a CWF entity (tool, part, or action)
      parameters:
        - name: entityId
          in: query
          required: false
          schema:
            type: string
          description: UUID of the entity
        - name: entityType
          in: query
          required: false
          schema:
            type: string
            enum:
              - tool
              - part
              - action
          description: Type of the entity
        - name: dateFrom
          in: query
          required: false
          schema:
            type: string
          description: ISO date string to filter observations from (inclusive)
        - name: dateTo
          in: query
          required: false
          schema:
            type: string
          description: ISO date string to filter observations to (inclusive)
      responses:
        "200":
          description: Observations retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  observations:
                    type: array
                    description: List of observations recorded for the entity
                    items:
                      type: object
                      properties:
                        observation_text:
                          type: string
                          description: The actual text/transcription of the observation
                        observed_at:
                          type: string
                          format: date-time
                          description: ISO timestamp when the observation was captured
                        observed_by_name:
                          type: string
                          description: Name or ID of the user who recorded the observation
                        photos:
                          type: array
                          items:
                            type: object
                            properties:
                              photo_url:
                                type: string
                              photo_description:
                                type: string
                              transcription:
                                type: string
                        metrics:
                          type: array
                          items:
                            type: object
                            properties:
                              metric_name:
                                type: string
                              value:
                                type: number
                              unit:
                                type: string
                  message:
                    type: string
                  instructions:
                    type: string
  /identifyDroneMonitoringTargets:
    post:
      operationId: identifyDroneMonitoringTargets
      description: Analyzes physical locations, temporal drift, and high-entropy states to propose a Decision Support Synthesis report and specific drone flight targets based on user directives. Do not ask for clarification; if vague, automatically consult farm values to assume a baseline inspection objective.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_directive:
                  type: string
                  description: "The user's query or intent (e.g., 'inspect coconuts'). CRITICAL: NEVER ask the user clarifying questions. If the user's request is vague, automatically assume a baseline inspection or infer the goal based on farm values."
              required:
                - user_directive
      responses:
        "200":
          description: Drone targets identified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  synthesis_report:
                    type: string
                    description: Human-readable markdown text detailing the hypotheses, expected outcomes, and proposed drone target routing logic.
                  proposed_flight_manifest:
                    type: array
                    description: Machine-readable array of physical targets for drone execution.
                    items:
                      type: object
                      properties:
                        location_id:
                          type: string
                        gps:
                          type: object
                          properties:
                            lat:
                              type: number
                            lon:
                              type: number
                        flight_specs:
                          type: object
                          properties:
                            approach_altitude_ft:
                              type: number
                            camera_tilt_deg:
                              type: number
                            focus_distance_ft:
                              type: number
